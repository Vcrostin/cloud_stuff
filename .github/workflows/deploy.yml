name: Deploy via YCR

on:
  push:
    tags:
      - 'v*.*.*'  # Триггер на теги v1.2.3

env:
  YC_REGISTRY: cr.yandex
  IMAGE_NAME: ${{ secrets.YC_REGISTRY_ID }}/cloud-hw-3
  FOLDER_ID: ${{ secrets.YC_FOLDER_ID }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        run: |
          echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
          echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Install yc CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- --install-dir ~/yc --skip-path
          echo "~/yc/bin" >> $GITHUB_PATH

      - name: Authenticate with Yandex Cloud
        run: |
          echo "${{ secrets.YC_SERVICE_ACCOUNT_KEY }}" > key.json
          yc config set folder-id $FOLDER_ID
          yc auth login --token $(yc iam create-token --token-file key.json)

      - name: Log in to YCR
        run: |
          yc container registry configure-docker
          # Это добавит creds в ~/.docker/config.json

      - name: Build and push Docker image to YCR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./src/Dockerfile
          push: true
          tags: |
            ${{ env.YC_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}
            ${{ env.YC_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            app_version=${{ env.VERSION }}
